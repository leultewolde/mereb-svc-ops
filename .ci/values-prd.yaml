nameOverride: svc-ops

replicaCount: 2

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-ops
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-ops
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector.platform-prd.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: OIDC_ISSUER
    - name: KEYCLOAK_URL
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: KEYCLOAK_URL
    - name: KEYCLOAK_REALM
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: KC_REALM
    - name: KEYCLOAK_INVITE_CLIENT_ID
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: KEYCLOAK_INVITE_CLIENT_ID
    - name: KEYCLOAK_INVITE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-prd-secrets
          key: KEYCLOAK_INVITE_CLIENT_SECRET
    - name: PROFILE_BOOTSTRAP_SHARED_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-prd-secrets
          key: PROFILE_BOOTSTRAP_SHARED_SECRET
  envFrom:
    - configMapRef:
        name: svc-ops-prd-config
    - secretRef:
        name: svc-ops-prd-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4009

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api.mereb.app
      paths:
        - path: /ops
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: ops-prd-tls
      hosts:
        - api.mereb.app

configMap:
  enabled: true
  nameOverride: svc-ops-prd-config
  data:
    PORT: "4009"
    OIDC_AUDIENCE: account
    OPS_DEFAULT_FLAGS: >-
      [{"key":"inviteOnlyRegistration","description":"Require invite redemption through /register for pilot signups.","enabled":false}]
    PROFILE_BOOTSTRAP_URL: http://svc-profile.apps-prd.svc.cluster.local/internal/users/bootstrap
    REDIS_URL: redis://platform-prd-redis.platform-prd.svc.cluster.local:6379
    KAFKA_BROKERS: redpanda-platform-prd:9092
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-prd

resources:
  requests:
    cpu: 50m
    memory: 256Mi

autoscaling:
  enabled: false
