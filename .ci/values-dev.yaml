nameOverride: svc-ops

replicaCount: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-ops
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-ops
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector-dev.platform-dev.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: OIDC_ISSUER
    - name: KEYCLOAK_URL
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: KEYCLOAK_URL
    - name: KEYCLOAK_REALM
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: KC_REALM
    - name: KEYCLOAK_INVITE_CLIENT_ID
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: KEYCLOAK_INVITE_CLIENT_ID
    - name: KEYCLOAK_INVITE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-dev-secrets
          key: KEYCLOAK_INVITE_CLIENT_SECRET
    - name: PROFILE_BOOTSTRAP_SHARED_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-dev-secrets
          key: PROFILE_BOOTSTRAP_SHARED_SECRET
    - name: INVITE_EMAIL_SMTP_HOST
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_HOST
    - name: INVITE_EMAIL_SMTP_PORT
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_PORT
    - name: INVITE_EMAIL_SMTP_FROM
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_FROM
    - name: INVITE_EMAIL_SMTP_FROM_DISPLAY_NAME
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_FROM_DISPLAY_NAME
          optional: true
    - name: INVITE_EMAIL_SMTP_REPLY_TO
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_REPLY_TO
          optional: true
    - name: INVITE_EMAIL_SMTP_REPLY_TO_DISPLAY_NAME
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_REPLY_TO_DISPLAY_NAME
          optional: true
    - name: INVITE_EMAIL_SMTP_SSL
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_SSL
    - name: INVITE_EMAIL_SMTP_STARTTLS
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: INVITE_EMAIL_SMTP_STARTTLS
    - name: INVITE_EMAIL_SMTP_USERNAME
      valueFrom:
        secretKeyRef:
          name: platform-identity-dev-secrets
          key: INVITE_EMAIL_SMTP_USERNAME
    - name: INVITE_EMAIL_SMTP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: platform-identity-dev-secrets
          key: INVITE_EMAIL_SMTP_PASSWORD
    - name: WEB_SHELL_ORIGIN
      valueFrom:
        configMapKeyRef:
          name: platform-identity-dev
          key: WEB_SHELL_ORIGIN
  envFrom:
    - configMapRef:
        name: svc-ops-dev-config
    - secretRef:
        name: svc-ops-dev-secrets
        optional: false

vaultSecretsOperator:
  enabled: true
  auth:
    create: true
    spec:
      vaultAuthGlobalRef:
        name: mereb-apps-dev
        namespace: vault-secrets-operator
      kubernetes:
        role: apps-dev-svc-ops
      mount: kubernetes-dev
  staticSecrets:
    - name: svc-ops-runtime
      spec:
        type: kv-v2
        mount: kv
        path: apps/dev
        refreshAfter: 5m
        destination:
          name: svc-ops-dev-secrets
          create: true
          overwrite: true
          transformation:
            excludes:
              - .*
            templates:
              DATABASE_URL:
                text: '{{- get .Secrets "OPS_DATABASE_URL" -}}'
              SPLUNK_HEC_TOKEN:
                text: '{{- get .Secrets "SPLUNK_HEC_TOKEN" -}}'
        rolloutRestartTargets:
          - kind: Deployment
            name: svc-ops-dev

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4009

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-dev.mereb.app
      paths:
        - path: /ops
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: ops-dev-tls
      hosts:
        - api-dev.mereb.app

extraIngresses:
  - nameSuffix: flags
    className: kong
    annotations:
      kubernetes.io/ingress.class: kong
      cert-manager.io/cluster-issuer: letsencrypt-http
      konghq.com/strip-path: "false"
      konghq.com/methods: GET,OPTIONS
      konghq.com/plugins: platform-cors-dev
    hosts:
      - host: api-dev.mereb.app
        paths:
          - path: /flags
            pathType: Prefix
            servicePort: http
    tls:
      - secretName: ops-dev-tls
        hosts:
          - api-dev.mereb.app
  - nameSuffix: invite-redeem
    className: kong
    annotations:
      kubernetes.io/ingress.class: kong
      cert-manager.io/cluster-issuer: letsencrypt-http
      konghq.com/strip-path: "false"
      konghq.com/methods: POST,OPTIONS
      konghq.com/plugins: platform-cors-dev
    hosts:
      - host: api-dev.mereb.app
        paths:
          - path: /invite/redeem
            pathType: Prefix
            servicePort: http
    tls:
      - secretName: ops-dev-tls
        hosts:
          - api-dev.mereb.app

configMap:
  enabled: true
  nameOverride: svc-ops-dev-config
  data:
    PORT: "4009"
    OIDC_AUDIENCE: account
    PROFILE_BOOTSTRAP_URL: http://svc-profile-dev.apps-dev.svc.cluster.local/internal/users/bootstrap
    REDIS_URL: redis://platform-dev-redis.platform-dev.svc.cluster.local:6379
    KAFKA_BROKERS: redpanda-platform-dev:9092
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-dev

resources:
  requests:
    cpu: 25m
    memory: 128Mi

autoscaling:
  enabled: false
