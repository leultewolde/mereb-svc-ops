nameOverride: svc-ops

replicaCount: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-ops
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-ops
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector-stg.platform-stg.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: OIDC_ISSUER
    - name: KEYCLOAK_URL
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: KEYCLOAK_URL
    - name: KEYCLOAK_REALM
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: KC_REALM
    - name: KEYCLOAK_INVITE_CLIENT_ID
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: KEYCLOAK_INVITE_CLIENT_ID
    - name: KEYCLOAK_INVITE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-stg-secrets
          key: KEYCLOAK_INVITE_CLIENT_SECRET
    - name: PROFILE_BOOTSTRAP_SHARED_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-stg-secrets
          key: PROFILE_BOOTSTRAP_SHARED_SECRET
  envFrom:
    - configMapRef:
        name: svc-ops-stg-config
    - secretRef:
        name: svc-ops-stg-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4009

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-stg.mereb.app
      paths:
        - path: /ops
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: ops-stg-tls
      hosts:
        - api-stg.mereb.app

extraIngresses:
  - nameSuffix: flags
    className: kong
    annotations:
      kubernetes.io/ingress.class: kong
      cert-manager.io/cluster-issuer: letsencrypt-http
      konghq.com/strip-path: "false"
      konghq.com/methods: GET,OPTIONS
      konghq.com/plugins: platform-cors-stg
    hosts:
      - host: api-stg.mereb.app
        paths:
          - path: /flags
            pathType: Prefix
            servicePort: http
    tls:
      - secretName: ops-stg-tls
        hosts:
          - api-stg.mereb.app
  - nameSuffix: invite-redeem
    className: kong
    annotations:
      kubernetes.io/ingress.class: kong
      cert-manager.io/cluster-issuer: letsencrypt-http
      konghq.com/strip-path: "false"
      konghq.com/methods: POST,OPTIONS
      konghq.com/plugins: platform-cors-stg
    hosts:
      - host: api-stg.mereb.app
        paths:
          - path: /invite/redeem
            pathType: Prefix
            servicePort: http
    tls:
      - secretName: ops-stg-tls
        hosts:
          - api-stg.mereb.app

configMap:
  enabled: true
  nameOverride: svc-ops-stg-config
  data:
    PORT: "4009"
    OIDC_AUDIENCE: account
    PROFILE_BOOTSTRAP_URL: http://svc-profile.apps-stg.svc.cluster.local/internal/users/bootstrap
    REDIS_URL: redis://platform-stg-redis.platform-stg.svc.cluster.local:6379
    KAFKA_BROKERS: redpanda-platform-stg:9092
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-stg

resources:
  requests:
    cpu: 25m
    memory: 128Mi

autoscaling:
  enabled: false
