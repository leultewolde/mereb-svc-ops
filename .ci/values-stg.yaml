nameOverride: svc-ops

replicaCount: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-ops
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-ops
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector-stg.platform-stg.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
  envFrom:
    - configMapRef:
        name: svc-ops-stg-config
    - secretRef:
        name: svc-ops-stg-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4009

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-stg.mereb.app
      paths:
        - path: /ops
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: ops-stg-tls
      hosts:
        - api-stg.mereb.app

configMap:
  enabled: true
  nameOverride: svc-ops-stg-config
  data:
    PORT: "4009"
    OIDC_ISSUER: https://auth.mereb.app/realms/mereb
    OIDC_AUDIENCE: account
    REDIS_URL: redis://platform-stg-redis.platform-stg.svc.cluster.local:6379
    KAFKA_BROKERS: redpanda-platform-stg:9092
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-stg

resources:
  requests:
    cpu: 50m
    memory: 128Mi

autoscaling:
  enabled: false
